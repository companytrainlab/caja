<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>TrainLab · tu caja</title>
<!--
  El landing del tag NFC de la caja. El tag graba:

      https://companytrainlab.github.io/caja/#producto-CODIGO
      (p. ej. #control-RWJNCB; el formato viejo #CODIGO sigue valiendo)

  El producto viaja en el propio hash A PROPÓSITO: la guía de primeros
  pasos y el botón de la app funcionan AL INSTANTE y SIN COBERTURA
  (unboxing en un gimnasio de sótano). La red solo añade lo vivo:
  número de serie y estado de la garantía, con caché local para que
  la segunda visita sea inmediata incluso offline.

  Los datos de la API se insertan SIEMPRE con textContent, nunca con
  innerHTML: lo que venga de fuera no puede ejecutar nada.
-->
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0E1117;color:#EAEEF6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
       min-height:100vh;display:flex;justify-content:center;padding:24px 16px}
  .caja{max-width:430px;width:100%}
  .marca{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:20px}
  .marca .train{color:#79839A}.marca .lab{color:#2E7DF6}
  .tarjeta{background:#181F2E;border-radius:18px;padding:22px;margin-bottom:14px}
  .chip{display:inline-block;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
        padding:5px 12px;border-radius:999px;margin-bottom:12px}
  h1{font-size:24px;font-weight:800;letter-spacing:-.5px;margin-bottom:8px}
  .que-es{color:#AAB3C5;font-size:15px;line-height:1.5}
  .serie{margin-top:14px;font-size:13px;color:#79839A}
  .serie b{color:#EAEEF6;font-weight:600}
  h2{font-size:15px;font-weight:700;margin-bottom:12px;color:#EAEEF6}
  ol{list-style:none;counter-reset:paso}
  ol li{counter-increment:paso;display:flex;gap:12px;font-size:14.5px;line-height:1.45;color:#C6CDDA;margin-bottom:12px}
  ol li::before{content:counter(paso);flex:0 0 24px;height:24px;border-radius:50%;background:#232C3F;
        color:#EAEEF6;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center}
  ol li:last-child{margin-bottom:0}
  .boton{display:block;text-align:center;text-decoration:none;font-size:16px;font-weight:700;
         padding:15px;border-radius:14px;margin-bottom:10px}
  .boton-sec{display:block;text-align:center;text-decoration:none;font-size:14.5px;font-weight:700;
         padding:13px;border-radius:14px;margin-bottom:14px;color:#2E7DF6;
         background:transparent;border:1.5px solid #2E7DF6}
  .aviso{display:none;background:#181F2E;border:1px solid #232C3F;border-radius:14px;padding:14px;
         font-size:13.5px;line-height:1.5;color:#AAB3C5;margin-bottom:14px}
  .aviso.visible{display:block}
  .aviso a{color:#2E7DF6;text-decoration:none}
  .garantia{font-size:13.5px;line-height:1.5;color:#AAB3C5}
  .garantia .estado{font-weight:700}
  .fundador{font-size:13.5px;line-height:1.6;color:#AAB3C5;border-left:3px solid #2E7DF6}
  .fundador .firma{margin-top:8px;color:#79839A;font-size:12.5px}
  .applista{list-style:none}
  .applista li{display:flex;gap:10px;font-size:14px;line-height:1.5;color:#C6CDDA;margin-bottom:10px}
  .applista li:last-child{margin-bottom:0}
  .refs{margin-top:16px;border-top:1px solid #232C3F;padding-top:13px}
  .refs .reftit{font-size:11.5px;font-weight:700;color:#AAB3C5;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
  .refs p{font-size:12px;color:#79839A;line-height:1.55;margin-bottom:7px}
  .refs p:last-child{margin-bottom:0}
  .video-ph{aspect-ratio:16/9;border:1.5px dashed #2A3448;border-radius:14px;display:flex;flex-direction:column;
        align-items:center;justify-content:center;gap:9px;color:#79839A;font-size:13px;text-align:center;padding:12px}
  .video-ph .play{width:46px;height:46px;border-radius:50%;background:#232C3F;display:flex;
        align-items:center;justify-content:center;font-size:17px;color:#EAEEF6;padding-left:4px}
  .tarjeta video{width:100%;border-radius:12px;display:block}
  .pie{text-align:center;font-size:12px;color:#79839A;line-height:1.6;margin-top:18px}
  .pie a{color:#79839A}
  .cargando{text-align:center;color:#79839A;padding:40px 0;font-size:14px}
  @keyframes late{50%{opacity:.35}}
  .cargando span{animation:late 1.2s ease-in-out infinite}
</style>
</head>
<body>
<div class="caja">
  <div class="marca"><span class="train">Train</span><span class="lab">Lab</span></div>
  <div id="contenido"><p class="cargando"><span>Leyendo tu caja…</span></p></div>
  <p class="pie" id="pie"></p>
</div>

<script>
(function () {
  "use strict";
  var API = "https://owzxkjnxipjalnprghmy.supabase.co/functions/v1/caja/";
  var SOPORTE = "companytrainlab@gmail.com";
  var WEB = "https://companytrainlab.github.io/";
  var RE_CODIGO = /^[A-HJ-NP-Z2-9]{6}$/;

  // La ficha de cada producto: color de familia (manual de marca), qué
  // app abre su botón (cada producto tiene la suya), qué es y los
  // primeros pasos. Es la guía de usuario del landing, y funciona
  // entera sin red porque el producto viene en el propio hash.
  var FICHAS = {
    control: {
      nombre: "TrainLab Control", app: "TrainLab", esquema: "trainlab://",
      color: "#AF52DE", tinta: "#FFFFFF",
      queEs: "Tu pulsera de recuperación: mide el corazón, el sueño y la variabilidad para saber cuándo apretar y cuándo aflojar.",
      pasos: [
        "Carga la pulsera con su cable hasta que la pantalla se encienda.",
        "Abre TrainLab en tu iPhone (botón de abajo).",
        "Entra en Salud → Pulsera y toca Buscar pulsera con el Bluetooth activado.",
        "Duerme con ella esta noche: mañana verás tu sueño, pulso en reposo y HRV.",
      ],
      video: null, // cuando exista: "videos/control.mp4" en este mismo repo
      queHace: [
        "Convierte tu sueño, tu pulso en reposo y tu variabilidad (HRV) en una disponibilidad diaria de 0 a 100.",
        "Lee la tendencia, no el día suelto: te dice cuándo apretar y cuándo aflojar.",
        "Comparte tu recuperación con tu entrenador para que la carga se ajuste a cómo llegas de verdad.",
      ],
      ciencia: [
        "Plews et al. (2013), Sports Medicine — la HRV como marcador de adaptación, interpretada en tendencia.",
        "Saw et al. (2016), British Journal of Sports Medicine — el bienestar diario responde a la carga antes que muchos marcadores objetivos.",
        "Kenttä y Hassmén (1998), Sports Medicine — el modelo de recuperación total que usa el motor de Control.",
      ],
    },
    velocity: {
      nombre: "TrainLab Velocity", app: "TrainLab Velocity", esquema: "trainlabvelocity://",
      color: "#17AEC9", tinta: "#FFFFFF",
      queEs: "El sensor de barra: mide la velocidad de cada repetición para entrenar con cargas óptimas.",
      pasos: [
        "Fija el sensor a la barra con el imán y asegúralo con la correa de velcro.",
        "Abre TrainLab Velocity (botón de abajo).",
        "Empareja el sensor por Bluetooth desde la pantalla de inicio.",
        "Haz una serie: verás la velocidad de cada repetición al momento.",
      ],
      video: null,
      queHace: [
        "Mide la velocidad de cada repetición y estima tu 1RM sin necesidad de ir al fallo.",
        "Ajusta la carga del día según cómo llegas: entrenamiento basado en velocidad (VBT).",
        "Corta la serie por pérdida de velocidad, antes de acumular fatiga que no suma.",
      ],
      ciencia: [
        "González-Badillo y Sánchez-Medina (2010), International Journal of Sports Medicine — la velocidad como medida de la intensidad real.",
        "Sánchez-Medina y González-Badillo (2011), Medicine & Science in Sports & Exercise — la pérdida de velocidad como indicador de fatiga neuromuscular.",
        "Jidovtseff et al. (2011), Journal of Strength and Conditioning Research — la relación carga-velocidad para estimar el 1RM.",
      ],
    },
    force: {
      nombre: "TrainLab Force", app: "TrainLab Force", esquema: "trainlabforce://",
      color: "#FF9500", tinta: "#141A28",
      queEs: "El dinamómetro: mide la fuerza máxima y la simetría entre lados en tests isométricos.",
      pasos: [
        "Ancla la célula de carga entre el punto fijo y el agarre, sin holguras.",
        "Abre TrainLab Force (botón de abajo).",
        "Conecta el dinamómetro por Bluetooth.",
        "Antes del primer test, sigue la calibración guiada de la app.",
      ],
      video: null,
      queHace: [
        "Mide tu fuerza máxima isométrica y tu explosividad (RFD) sin mover cargas peligrosas.",
        "Compara izquierda y derecha: las asimetrías por encima del 10-15 % encienden el semáforo.",
        "Sigue tu readaptación con datos objetivos, test a test.",
      ],
      ciencia: [
        "Bishop, Turner y Read (2018), Journal of Sports Sciences — las asimetrías entre lados y su efecto en el rendimiento.",
        "Ardern et al. (2016), British Journal of Sports Medicine — el consenso de Berna sobre la vuelta al deporte.",
        "Buckthorpe (2019), Sports Medicine — criterios objetivos en la fase final de la readaptación.",
      ],
    },
    signal: {
      nombre: "TrainLab Signal", app: "TrainLab Signal", esquema: "trainlabsignal://",
      color: "#FFD60A", tinta: "#141A28",
      queEs: "El sensor EMG: mide la activación muscular real para valorar readaptaciones y asimetrías.",
      pasos: [
        "Limpia la piel y coloca los electrodos sobre el vientre del músculo.",
        "Abre TrainLab Signal (botón de abajo).",
        "Conecta el sensor por Bluetooth.",
        "Haz una contracción máxima (MVC) para calibrar la escala.",
      ],
      video: null,
      queHace: [
        "Mide la activación real del músculo (EMG de superficie) mientras trabajas.",
        "Expresa cada ejercicio como porcentaje de tu contracción máxima (MVC): intensidad comparable entre días.",
        "Detecta asimetrías de activación en la readaptación antes de que se vean a simple vista.",
      ],
      ciencia: [
        "Hermens et al. (2000), Journal of Electromyography and Kinesiology — SENIAM, el estándar europeo de colocación y registro de EMG de superficie.",
        "De Luca (1997), Journal of Applied Biomechanics — el uso correcto de la electromiografía de superficie en biomecánica.",
      ],
    },
  };

  var contenido = document.getElementById("contenido");
  var pie = document.getElementById("pie");

  // Piezas del DOM sin innerHTML para todo dato variable.
  function el(tag, clase, texto) {
    var n = document.createElement(tag);
    if (clase) n.className = clase;
    if (texto != null) n.textContent = texto;
    return n;
  }

  function pieSoporte(asunto) {
    pie.textContent = "";
    var a = el("a", null, SOPORTE);
    a.href = "mailto:" + SOPORTE + "?subject=" + encodeURIComponent(asunto);
    pie.append("¿Dudas o algún problema? ", a, document.createElement("br"), "TrainLab · hecho en España");
  }

  // Caché local: la segunda visita pinta serie y garantía al instante,
  // incluso sin cobertura. La red, cuando vuelva, lo refresca.
  function cacheLeer(codigo) {
    try { return JSON.parse(localStorage.getItem("caja:" + codigo)); } catch (e) { return null; }
  }
  function cacheGuardar(caja) {
    try { localStorage.setItem("caja:" + caja.codigo, JSON.stringify(caja)); } catch (e) {}
  }

  // ---- Las tarjetas ----

  function tarjetaProducto(f, caja, codigo) {
    var t = el("div", "tarjeta");
    var chip = el("span", "chip", f.nombre.replace("TrainLab ", "") || "TrainLab");
    chip.style.background = f.color; chip.style.color = f.tinta;
    var serie = el("p", "serie");
    if (caja) {
      serie.append("Producto original · Nº de serie ", el("b", null, caja.numero_serie),
                   " · Caja ", el("b", null, caja.codigo));
    } else {
      serie.append("Caja ", el("b", null, codigo));
    }
    t.append(chip, el("h1", null, f.nombre), el("p", "que-es", f.queEs), serie);
    return t;
  }

  function tarjetaPasos(f) {
    var t = el("div", "tarjeta");
    t.append(el("h2", null, "Primeros pasos"));
    var lista = document.createElement("ol");
    f.pasos.forEach(function (p) { lista.append(el("li", null, p)); });
    t.append(lista);
    return t;
  }

  function botonApp(f, codigo) {
    var frag = document.createDocumentFragment();
    var boton = el("a", "boton", "Abrir en " + f.app);
    boton.style.background = f.color; boton.style.color = f.tinta;
    boton.href = f.esquema + "caja/" + codigo;

    // Si la app no está instalada, el enlace no hace nada: pasado un
    // momento sin que el sistema pause la página (la app en primer
    // plano la congela), enseñamos el plan B de la beta.
    var aviso = el("div", "aviso");
    var mail = el("a", null, SOPORTE);
    mail.href = "mailto:" + SOPORTE + "?subject=" + encodeURIComponent("Acceso beta · caja " + codigo);
    aviso.append("¿No se ha abierto nada? TrainLab está en beta privada: escribe a ", mail,
                 " con este código y te enviamos la invitación con tu plan ya incluido.");
    boton.addEventListener("click", function () {
      var t0 = Date.now();
      setTimeout(function () {
        if (Date.now() - t0 < 2400 && !document.hidden) aviso.classList.add("visible");
      }, 1800);
    });
    frag.append(boton, aviso);
    return frag;
  }

  // estado: "activada" | "pendiente" | "comprobando" | "sin-red"
  function tarjetaGarantia(estado, caja, codigo) {
    var t = el("div", "tarjeta garantia");
    t.append(el("h2", null, "Garantía"));
    var g = el("p");
    if (estado === "activada") {
      var fecha = new Date(caja.activada_at).toLocaleDateString("es-ES", { day: "numeric", month: "long", year: "numeric" });
      var s = el("span", "estado", "Activa"); s.style.color = "#34C759";
      g.append(s, " desde el " + fecha + ". Cubre 3 años; guarda esta caja o el código ",
               el("b", null, caja.codigo), " para cualquier gestión.");
    } else if (estado === "pendiente") {
      var p = el("span", "estado", "Pendiente de activar."); p.style.color = "#FF9500";
      g.append(p, " Se registra a tu nombre al estrenar la app — y si prefieres, escríbenos con el código ",
               el("b", null, codigo), " y la activamos nosotros. Cubre 3 años.");
    } else if (estado === "sin-red") {
      var r = el("span", "estado", "Ahora mismo no se puede comprobar."); r.style.color = "#79839A";
      g.append(r, " Tu guía funciona igual; con conexión, recarga y verás el estado. La garantía de 3 años no depende de esta página.");
    } else {
      var c = el("span", "estado", "Comprobando…"); c.style.color = "#79839A";
      g.append(c);
    }
    t.append(g);
    return t;
  }

  // Qué hace la app y en qué ciencia se apoya. Las referencias salen del
  // documento de fundamento científico de TrainLab: aquí no se promete
  // nada que el dossier no pueda defender.
  function tarjetaApp(f) {
    var t = el("div", "tarjeta");
    t.append(el("h2", null, "Qué hace " + f.app));
    var ul = el("ul", "applista");
    f.queHace.forEach(function (q) {
      var li = el("li");
      var check = el("span", null, "✓");
      check.style.color = f.color; check.style.fontWeight = "700";
      li.append(check, el("span", null, q));
      ul.append(li);
    });
    var refs = el("div", "refs");
    refs.append(el("p", "reftit", "La ciencia que lo sostiene"));
    f.ciencia.forEach(function (r) { refs.append(el("p", null, r)); });
    t.append(ul, refs);
    return t;
  }

  // El vídeo explicativo de la app. Hasta que exista (f.video = ruta del
  // mp4 en este repo), un hueco elegante que no promete fechas.
  function tarjetaVideo(f) {
    var t = el("div", "tarjeta");
    t.append(el("h2", null, "La app, en vídeo"));
    if (f.video) {
      var v = document.createElement("video");
      v.src = f.video;
      v.controls = true;
      v.playsInline = true;
      v.preload = "metadata";
      t.append(v);
    } else {
      var ph = el("div", "video-ph");
      ph.append(
        el("div", "play", "▶"),
        el("span", null, "Estamos grabando el vídeo de " + f.app + "."),
        el("span", null, "Mientras tanto, los pasos de arriba te llevan igual de lejos.")
      );
      t.append(ph);
    }
    return t;
  }

  function botonWeb() {
    var b = el("a", "boton-sec", "Descubrir TrainLab");
    b.href = WEB;
    return b;
  }

  function tarjetaFundador() {
    var t = el("div", "tarjeta fundador");
    t.append(
      el("p", null, "Gracias por estar entre los primeros. TrainLab se construye pieza a pieza en España, y esta caja es de las primeras que salen. Si algo no va perfecto, escríbeme y lo arreglo yo mismo."),
      el("p", "firma", "— José David, fundador de TrainLab")
    );
    return t;
  }

  // ---- Las páginas ----

  function pintarCaja(producto, caja, codigo, estadoGarantia) {
    var f = FICHAS[producto];
    document.title = f.nombre + " · caja " + codigo;
    contenido.textContent = "";
    contenido.append(
      tarjetaProducto(f, caja, codigo),
      tarjetaPasos(f),
      botonApp(f, codigo),
      tarjetaVideo(f),
      tarjetaApp(f),
      tarjetaGarantia(estadoGarantia, caja, codigo),
      tarjetaFundador(),
      botonWeb()
    );
    pieSoporte("Soporte · caja " + codigo);
  }

  function pintarPortada() {
    document.title = "TrainLab · tu caja";
    contenido.textContent = "";
    var t = el("div", "tarjeta");
    t.append(el("h1", null, "Tu caja TrainLab"),
             el("p", "que-es", "Acerca el móvil al símbolo NFC de la caja (o escanea su código QR) y aquí aparecerán tu guía de primeros pasos y tu garantía."));
    contenido.append(t, botonWeb());
    pieSoporte("Mi caja TrainLab");
  }

  function pintarDesconocida(codigo) {
    document.title = "TrainLab · código no reconocido";
    contenido.textContent = "";
    var t = el("div", "tarjeta");
    var p = el("p", "que-es");
    p.style.marginTop = "8px";
    p.append("El código ", el("b", null, codigo),
      " no corresponde a ninguna caja registrada de TrainLab. Si acabas de comprar el producto, puede tratarse de un error de lectura — o de una unidad no original.");
    t.append(el("h1", null, "Código no reconocido"), p,
             el("p", "serie", "Escríbenos con una foto de la caja y lo comprobamos al momento."));
    var boton = el("a", "boton", "Escribir a soporte");
    boton.style.background = "#2E7DF6"; boton.style.color = "#fff";
    boton.href = "mailto:" + SOPORTE + "?subject=" + encodeURIComponent("Código no reconocido · " + codigo);
    contenido.append(t, boton);
    pieSoporte("Código no reconocido · " + codigo);
  }

  // ---- El arranque ----

  function arrancar() {
    var hash = decodeURIComponent(location.hash.replace(/^#/, "")).trim().toLowerCase();
    if (!hash) { pintarPortada(); return; }

    // #producto-CODIGO (el bueno) o #CODIGO (formato viejo, sigue vivo)
    var producto = null, codigo = hash;
    var guion = hash.indexOf("-");
    if (guion > 0 && FICHAS[hash.slice(0, guion)]) {
      producto = hash.slice(0, guion);
      codigo = hash.slice(guion + 1);
    }
    codigo = codigo.toUpperCase();
    if (!RE_CODIGO.test(codigo)) { pintarDesconocida(codigo || hash); return; }

    // Con el producto en la mano, TODO lo útil se pinta ya, sin esperar
    // a la red; la caché puede adelantar incluso la serie y la garantía.
    var cacheada = cacheLeer(codigo);
    if (producto) {
      pintarCaja(producto, cacheada, codigo,
                 cacheada ? (cacheada.activada_at ? "activada" : "pendiente") : "comprobando");
    } else if (cacheada && FICHAS[cacheada.producto]) {
      pintarCaja(cacheada.producto, cacheada, codigo,
                 cacheada.activada_at ? "activada" : "pendiente");
    }

    fetch(API + codigo, { headers: { Accept: "application/json" } })
      .then(function (r) {
        if (r.status === 404) { pintarDesconocida(codigo); return null; }
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(function (caja) {
        if (!caja) return;
        cacheGuardar(caja);
        pintarCaja(caja.producto, caja, caja.codigo,
                   caja.activada_at ? "activada" : "pendiente");
      })
      .catch(function () {
        if (producto || cacheada) {
          // La guía ya está en pantalla; solo la garantía queda sin comprobar.
          pintarCaja(producto || cacheada.producto, cacheada, codigo, cacheada ? (cacheada.activada_at ? "activada" : "pendiente") : "sin-red");
        } else {
          contenido.textContent = "";
          var t = el("div", "tarjeta");
          t.append(el("h1", null, "Sin conexión"),
                   el("p", "que-es", "No hemos podido leer los datos de tu caja. Comprueba la conexión y recarga la página."));
          contenido.append(t);
          pieSoporte("No carga el landing de la caja");
        }
      });
  }

  // Si el #hash llega o cambia después de cargar (algún navegador o
  // lector NFC lo añade tarde), la página se repinta sola.
  window.addEventListener("hashchange", arrancar);
  arrancar();
})();
</script>
<noscript><p style="text-align:center;color:#AAB3C5">Esta página necesita JavaScript. Escríbenos a companytrainlab@gmail.com con el código de tu caja.</p></noscript>
</body>
</html>
