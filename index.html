<!--

      https://companytrainlab.github.io/caja/#producto-CODIGO
      (p. ej. #control-RWJNCB; el formato viejo #CODIGO sigue valiendo)

  El producto viaja en el propio hash A PROPÓSITO: la guía de primeros
  pasos y el botón de la app funcionan AL INSTANTE y SIN COBERTURA
  (unboxing en un gimnasio de sótano). La red solo añade lo vivo:
  número de serie y estado de la garantía, con caché local para que
  la segunda visita sea inmediata incluso offline.

  Los datos de la API se insertan SIEMPRE con textContent, nunca con
  innerHTML: lo que venga de fuera no puede ejecutar nada.
-->
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0E1117;color:#EAEEF6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
       min-height:100vh;display:flex;justify-content:center;padding:24px 16px}
  .caja{max-width:430px;width:100%}
  .marca{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:20px}
  .marca .train{color:#79839A}.marca .lab{color:#2E7DF6}
  .tarjeta{background:#181F2E;border-radius:18px;padding:22px;margin-bottom:14px}
  .chip{display:inline-block;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
        padding:5px 12px;border-radius:999px;margin-bottom:12px}
  h1{font-size:24px;font-weight:800;letter-spacing:-.5px;margin-bottom:8px}
  .que-es{color:#AAB3C5;font-size:15px;line-height:1.5}
  .serie{margin-top:14px;font-size:13px;color:#79839A}
  .serie b{color:#EAEEF6;font-weight:600}
  h2{font-size:15px;font-weight:700;margin-bottom:12px;color:#EAEEF6}
  ol{list-style:none;counter-reset:paso}
  ol li{counter-increment:paso;display:flex;gap:12px;font-size:14.5px;line-height:1.45;color:#C6CDDA;margin-bottom:12px}
  ol li::before{content:counter(paso);flex:0 0 24px;height:24px;border-radius:50%;background:#232C3F;
        color:#EAEEF6;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center}
  ol li:last-child{margin-bottom:0}
  .boton{display:block;text-align:center;text-decoration:none;font-size:16px;font-weight:700;
         padding:15px;border-radius:14px;margin-bottom:10px}
  .boton-sec{display:block;text-align:center;text-decoration:none;font-size:14.5px;font-weight:700;
         padding:13px;border-radius:14px;margin-bottom:14px;color:#2E7DF6;
         background:transparent;border:1.5px solid #2E7DF6}
  .aviso{display:none;background:#181F2E;border:1px solid #232C3F;border-radius:14px;padding:14px;
         font-size:13.5px;line-height:1.5;color:#AAB3C5;margin-bottom:14px}
  .aviso.visible{display:block}
  .aviso a{color:#2E7DF6;text-decoration:none}
  .garantia{font-size:13.5px;line-height:1.5;color:#AAB3C5}
  .garantia .estado{font-weight:700}
  .fundador{font-size:13.5px;line-height:1.6;color:#AAB3C5;border-left:3px solid #2E7DF6}
  .fundador .firma{margin-top:8px;color:#79839A;font-size:12.5px}
  .applista{list-style:none}
  .applista li{display:flex;gap:10px;font-size:14px;line-height:1.5;color:#C6CDDA;margin-bottom:10px}
  .applista li:last-child{margin-bottom:0}
  .refs{margin-top:16px;border-top:1px solid #232C3F;padding-top:13px}
  .refs .reftit{font-size:11.5px;font-weight:700;color:#AAB3C5;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
  .refs p{font-size:12px;color:#79839A;line-height:1.55;margin-bottom:7px}
  .refs p:last-child{margin-bottom:0}
  .video-ph{aspect-ratio:16/9;border:1.5px dashed #2A3448;border-radius:14px;display:flex;flex-direction:column;
        align-items:center;justify-content:center;gap:9px;color:#79839A;font-size:13px;text-align:center;padding:12px}
  .video-ph .play{width:46px;height:46px;border-radius:50%;background:#232C3F;display:flex;
        align-items:center;justify-content:center;font-size:17px;color:#EAEEF6;padding-left:4px}

  .pie{text-align:center;font-size:12px;color:#79839A;line-height:1.6;margin-top:18px}
  .pie a{color:#79839A}
  .cargando{text-align:center;color:#79839A;padding:40px 0;font-size:14px}
  @keyframes late{50%{opacity:.35}}
  .cargando span{animation:late 1.2s ease-in-out infinite}

  /* Entrada de las tarjetas: sube y aparece, en cascada. */
  @keyframes subir{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .anima{animation:subir .5s ease both}

  /* Pasos marcables: toca un paso y queda hecho (se guarda en el móvil). */
  ol li{cursor:pointer;-webkit-tap-highlight-color:transparent}
  ol li.hecha::before{content:"✓";background:var(--acento,#2E7DF6);color:#141A28}
  ol li.hecha span{color:#79839A}
  .progreso{font-size:12.5px;color:#79839A;margin:-6px 0 12px}
  .progreso b{color:#EAEEF6}

  /* La gráfica demo: una pantalla de la app recreada, sin salir de la caja. */
  .grafica{margin:4px 0 18px;background:#101626;border:1px solid #202A3D;border-radius:14px;padding:15px 15px 13px}
  .grafica svg{width:100%;height:auto;display:block;overflow:visible}
  .viz-tit{font-size:14.5px;font-weight:700;color:#EAEEF6;line-height:1.35}
  .viz-sub{font-size:11.5px;color:#79839A;margin:2px 0 12px;line-height:1.4}
  .viz-badge{display:flex;align-items:baseline;gap:8px;margin:2px 0 12px}
  .viz-badge .num{font-size:31px;font-weight:800;letter-spacing:-1px;line-height:1;white-space:nowrap}
  .viz-badge .lab{font-size:12.5px;color:#AAB3C5;font-weight:600}
  .viz-take{font-size:12.5px;color:#8A93A6;line-height:1.55;margin-top:11px;padding-top:11px;border-top:1px solid #202A3D}
  /* La ciencia: método → autor → explicación, como la web de la marca. */
  .cred{border-top:1px solid #232C3F;padding-top:15px;margin-top:17px}
  .credhead{font-size:11.5px;font-weight:700;color:#AAB3C5;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
  .credsub{font-size:12.5px;color:#79839A;margin-bottom:15px;line-height:1.5}
  .credit{margin-bottom:14px}
  .credit:last-child{margin-bottom:0}
  .credit .m{font-size:14px;font-weight:700;color:#EAEEF6;line-height:1.3}
  .credit .a{font-size:12px;font-weight:600;margin:2px 0 4px}
  .credit .x{font-size:12.5px;color:#8A93A6;line-height:1.5}
  .g-linea{fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;
        stroke-dasharray:600;stroke-dashoffset:600;animation:trazar 1.6s .3s ease forwards}
  @keyframes trazar{to{stroke-dashoffset:0}}
  .g-barra{transform-origin:bottom;transform:scaleY(0);animation:crecer .7s ease forwards}
  .g-hbarra{transform-origin:left;transform:scaleX(0);animation:crecerx .8s .2s ease forwards}
  @keyframes crecer{to{transform:scaleY(1)}}
  @keyframes crecerx{to{transform:scaleX(1)}}
  .g-punto{opacity:0;animation:aparecer .3s ease forwards}
  @keyframes aparecer{to{opacity:1}}

  .g-barra,.g-hbarra{transform-box:fill-box}

  @media (prefers-reduced-motion: reduce){
    .anima,.g-linea,.g-barra,.g-hbarra,.g-punto{animation:none;opacity:1;transform:none;stroke-dashoffset:0}
  }
</style>

<script>

        { metodo: "Vuelta al deporte", autor: "Consenso de Berna — Ardern et al., 2016 · Br J Sports Med", texto: "Los criterios internacionales que convierten el alta de una lesión en una decisión con datos, no una sensación." },

        { metodo: "Readaptación de fase final", autor: "Buckthorpe, 2019 · Sports Medicine", texto: "Criterios de fuerza y simetría para las últimas fases de la readaptación antes del alta deportiva." },

    signal: {
      nombre: "TrainLab Signal", app: "TrainLab Signal", esquema: "trainlabsignal://",
      color: "#FFD60A", tinta: "#141A28",

        "Detecta asimetrías de activación en la readaptación antes de que se vean a simple vista.",
      ],
      ciencia: [

        { metodo: "Leer la amplitud", autor: "Vigotsky et al., 2018 · Frontiers in Physiology", texto: "Cómo interpretar —y cómo no— la amplitud de la señal EMG en el deporte y la readaptación." },

      ],
    },
  };

  var contenido = document.getElementById("contenido");
  var pie = document.getElementById("pie");

  // Piezas del DOM sin innerHTML para todo dato variable.
  function el(tag, clase, texto) {
    var n = document.createElement(tag);
    if (clase) n.className = clase;
    if (texto != null) n.textContent = texto;
    return n;
  }

  function pieSoporte(asunto) {
    pie.textContent = "";
    var a = el("a", null, SOPORTE);
    a.href = "mailto:" + SOPORTE + "?subject=" + encodeURIComponent(asunto);
    pie.append("¿Dudas o algún problema? ", a, document.createElement("br"), "TrainLab · hecho en España");
  }

  // Caché local: la segunda visita pinta serie y garantía al instante,
  // incluso sin cobertura. La red, cuando vuelva, lo refresca.
  function cacheLeer(codigo) {
    try { return JSON.parse(localStorage.getItem("caja:" + codigo)); } catch (e) { return null; }
  }
  function cacheGuardar(caja) {
    try { localStorage.setItem("caja:" + caja.codigo, JSON.stringify(caja)); } catch (e) {}
  }

  // ---- Las tarjetas ----

  function tarjetaProducto(f, caja, codigo) {
    var t = el("div", "tarjeta");
    var chip = el("span", "chip", f.nombre.replace("TrainLab ", "") || "TrainLab");
    chip.style.background = f.color; chip.style.color = f.tinta;
    var serie = el("p", "serie");
    if (caja) {
      serie.append("Producto original · Nº de serie ", el("b", null, caja.numero_serie),
                   " · Caja ", el("b", null, caja.codigo));
    } else {
      serie.append("Caja ", el("b", null, codigo));
    }
    t.append(chip, el("h1", null, f.nombre), el("p", "que-es", f.queEs), serie);
    return t;
  }

  // Los pasos se pueden marcar con un toque y quedan guardados en el
  // móvil (por caja): quien retoma el estreno más tarde sabe por dónde iba.
  function tarjetaPasos(f, codigo) {
    var t = el("div", "tarjeta");
    t.append(el("h2", null, "Primeros pasos"));
    var progreso = el("p", "progreso");
    var lista = document.createElement("ol");
    var clave = "pasos:" + codigo;
    var hechos = [];
    try { hechos = JSON.parse(localStorage.getItem(clave)) || []; } catch (e) {}

    function pintarProgreso() {
      progreso.textContent = "";
      var n = lista.querySelectorAll(".hecha").length;
      if (n === f.pasos.length) {
        progreso.append("¡Lista! Tu ", el("b", null, f.app.replace("TrainLab ", "") || "caja"), " está en marcha. 🎉");
      } else {
        progreso.append("Toca cada paso al completarlo — llevas ", el("b", null, n + " de " + f.pasos.length), ".");
      }
    }

    f.pasos.forEach(function (p, i) {
      var li = el("li");
      li.style.setProperty("--acento", f.color);
      li.append(el("span", null, p));
      if (hechos.indexOf(i) !== -1) li.classList.add("hecha");
      li.addEventListener("click", function () {
        li.classList.toggle("hecha");
        var ahora = [];
        lista.querySelectorAll("li").forEach(function (x, j) {
          if (x.classList.contains("hecha")) ahora.push(j);
        });
        try { localStorage.setItem(clave, JSON.stringify(ahora)); } catch (e) {}
        pintarProgreso();
      });
      lista.append(li);
    });

    pintarProgreso();
    t.append(progreso, lista);
    return t;
  }

  function botonApp(f, codigo) {
    var frag = document.createDocumentFragment();
    var boton = el("a", "boton", "Abrir en " + f.app);
    boton.style.background = f.color; boton.style.color = f.tinta;
    boton.href = f.esquema + "caja/" + codigo;

    // Si la app no está instalada, el enlace no hace nada: pasado un
    // momento sin que el sistema pause la página (la app en primer
    // plano la congela), enseñamos el plan B de la beta.
    var aviso = el("div", "aviso");
    var mail = el("a", null, SOPORTE);
    mail.href = "mailto:" + SOPORTE + "?subject=" + encodeURIComponent("Acceso beta · caja " + codigo);
    aviso.append("¿No se ha abierto nada? TrainLab está en beta privada: escribe a ", mail,
                 " con este código y te enviamos la invitación con tu plan ya incluido.");
    boton.addEventListener("click", function () {
      var t0 = Date.now();
      setTimeout(function () {
        if (Date.now() - t0 < 2400 && !document.hidden) aviso.classList.add("visible");
      }, 1800);
    });
    frag.append(boton, aviso);
    return frag;
  }

  // estado: "activada" | "pendiente" | "comprobando" | "sin-red"
  function tarjetaGarantia(estado, caja, codigo) {
    var t = el("div", "tarjeta garantia");
    t.append(el("h2", null, "Garantía"));
    var g = el("p");
    if (estado === "activada") {
      var fecha = new Date(caja.activada_at).toLocaleDateString("es-ES", { day: "numeric", month: "long", year: "numeric" });
      var s = el("span", "estado", "Activa"); s.style.color = "#34C759";
      g.append(s, " desde el " + fecha + ". Cubre 3 años; guarda esta caja o el código ",
               el("b", null, caja.codigo), " para cualquier gestión.");
    } else if (estado === "pendiente") {
      var p = el("span", "estado", "Pendiente de activar."); p.style.color = "#FF9500";
      g.append(p, " Se registra a tu nombre al estrenar la app — y si prefieres, escríbenos con el código ",
               el("b", null, codigo), " y la activamos nosotros. Cubre 3 años.");
    } else if (estado === "sin-red") {
      var r = el("span", "estado", "Ahora mismo no se puede comprobar."); r.style.color = "#79839A";
      g.append(r, " Tu guía funciona igual; con conexión, recarga y verás el estado. La garantía de 3 años no depende de esta página.");
    } else {
      var c = el("span", "estado", "Comprobando…"); c.style.color = "#79839A";
      g.append(c);
    }
    t.append(g);
    return t;
  }

  // La gráfica demo de cada producto: una pantalla de la app recreada
  // con datos de ejemplo, SVG propio y cero librerías. Devuelve título,
  // subtítulo, badge, el SVG y la frase de conclusión. Es estática y
  // nuestra (sin datos de fuera), así que el SVG va por innerHTML.
  function graficaDe(producto, color) {
    var eje = '#26314A', texto = '#79839A', W = 340;
    if (producto === "control") {
      // VFC de 14 noches contra la base de 28 días: manda la tendencia.
      var v = [66, 63, 68, 65, 61, 58, 52, 60, 64, 67, 63, 66, 69, 71], base = 64;
      var x = function (i) { return 16 + i * (308 / 13); };
      var y = function (n) { return 122 - (n - 45) * 2.3; };
      var pts = v.map(function (n, i) { return x(i).toFixed(1) + "," + y(n).toFixed(1); }).join(" ");
      var dip = 6; // la noche corta
      return {
        titulo: "Cómo llegas hoy",
        subtitulo: "VFC de 14 noches frente a tu base de 28 días · datos de ejemplo",
        badge: { num: "83", lab: "Disponibilidad · listo para entrenar" },
        svg: '<svg viewBox="0 0 340 138" aria-hidden="true">' +
          '<line x1="12" y1="' + y(base) + '" x2="328" y2="' + y(base) + '" stroke="' + eje + '" stroke-dasharray="4 4"/>' +
          '<text x="326" y="' + (y(base) + 14) + '" font-size="10" fill="' + texto + '" text-anchor="end">base 28 días</text>' +
          '<polyline class="g-linea" points="' + pts + '" stroke="' + color + '"/>' +
          '<circle class="g-punto" style="animation-delay:1.4s" cx="' + x(dip) + '" cy="' + y(v[dip]) + '" r="4.5" fill="#FF9500"/>' +
          '<text class="g-punto" style="animation-delay:1.6s" x="' + x(dip) + '" y="' + (y(v[dip]) + 20) + '" font-size="10" fill="#FF9500" text-anchor="middle">noche corta</text>' +
          '<circle class="g-punto" style="animation-delay:1.5s" cx="' + x(13) + '" cy="' + y(v[13]) + '" r="4.5" fill="' + color + '"/>' +
          '</svg>',
        take: "La noche corta se ve al momento, y Control baja la carga de hoy sin que se lo pidas.",
      };
    }
    if (producto === "velocity") {
      // Velocidad por repetición: la serie se corta antes de la fatiga inútil.
      var reps = [0.82, 0.80, 0.77, 0.72, 0.65, 0.57], v0 = 0.82;
      var bx = function (i) { return 20 + i * 52; };
      var by = function (val) { return 120 - val * 118; };
      var corteY = by(v0 * 0.8);
      var barras = reps.map(function (n, i) {
        var top = by(n), lenta = n < v0 * 0.8;
        return '<rect class="g-barra" style="animation-delay:' + (0.15 + i * 0.12) + 's" x="' + bx(i) + '" y="' + top + '" width="34" height="' + (120 - top) + '" rx="5" fill="' + color + '"' + (lenta ? ' opacity="0.28"' : '') + '/>' +
          '<text x="' + (bx(i) + 17) + '" y="133" font-size="9.5" fill="' + texto + '" text-anchor="middle">R' + (i + 1) + '</text>';
      }).join("");
      return {
        titulo: "Una serie al 75 %, repetición a repetición",
        subtitulo: "velocidad de cada repetición (m/s) · corte al perder el 20 % · datos de ejemplo",
        badge: { num: "0,82", lab: "m/s · la 1ª repetición manda" },
        svg: '<svg viewBox="0 0 340 138" aria-hidden="true">' + barras +
          '<line x1="12" y1="' + corteY + '" x2="328" y2="' + corteY + '" stroke="#FF9500" stroke-dasharray="4 4"/>' +
          '<text x="326" y="' + (corteY - 5) + '" font-size="10" fill="#FF9500" text-anchor="end">corta aquí · −20 %</text></svg>',
        take: "La primera repetición es la que cuenta: al perder el 20 % de velocidad, la serie ya cumplió y las repeticiones grises sobran.",
      };
    }
    if (producto === "force") {
      // La simetría entre piernas subiendo hasta el criterio de alta.
      var lsi = [55, 61, 68, 74, 81, 87, 92], crit = 90;
      var fx = function (i) { return 22 + i * (300 / 6); };
      var fy = function (p) { return 120 - (p - 45) * 1.75; };
      var lpts = lsi.map(function (p, i) { return fx(i).toFixed(1) + "," + fy(p).toFixed(1); }).join(" ");
      var puntos = lsi.map(function (p, i) {
        var alta = p >= crit;
        return '<circle class="g-punto" style="animation-delay:' + (0.4 + i * 0.2) + 's" cx="' + fx(i) + '" cy="' + fy(p) + '" r="' + (alta ? 5.5 : 4) + '" fill="' + (alta ? "#34C759" : color) + '"/>';
      }).join("");
      return {
        titulo: "Una readaptación: la simetría, test a test",
        subtitulo: "LSI, pierna lesionada frente a sana · criterio de alta 90 % · datos de ejemplo",
        badge: { num: "92 %", lab: "LSI · criterio alcanzado", color: "#34C759" },
        svg: '<svg viewBox="0 0 340 138" aria-hidden="true">' +
          '<line x1="12" y1="' + fy(crit) + '" x2="328" y2="' + fy(crit) + '" stroke="#34C759" stroke-dasharray="4 4"/>' +
          '<text x="14" y="' + (fy(crit) - 6) + '" font-size="10" fill="#34C759">criterio · 90 %</text>' +
          '<polyline class="g-linea" points="' + lpts + '" stroke="' + color + '"/>' + puntos +
          '<text x="22" y="133" font-size="9.5" fill="' + texto + '">test 1</text>' +
          '<text x="322" y="133" font-size="9.5" fill="' + texto + '" text-anchor="end">test 7</text></svg>',
        take: "La vuelta al deporte deja de ser una sensación: la pierna alcanza el criterio y el alta se decide con un número.",
      };
    }
    // signal: la envolvente EMG de dos repeticiones contra el MVC.
    var trazo = "M14,112 C40,112 48,40 82,38 C112,36 118,96 150,102 C166,105 172,112 186,112 C210,112 218,46 250,44 C278,42 286,98 326,108";
    return {
      titulo: "Lo que ve Signal: la activación del músculo",
      subtitulo: "EMG de superficie en dos repeticiones · frente al 100 % de tu MVC · concepto",
      badge: { num: "94 %", lab: "del MVC · pico de la 2ª repetición" },
      svg: '<svg viewBox="0 0 340 132" aria-hidden="true">' +
        '<line x1="12" y1="30" x2="328" y2="30" stroke="' + texto + '" stroke-dasharray="4 4"/>' +
        '<text x="326" y="25" font-size="10" fill="' + texto + '" text-anchor="end">100 % MVC</text>' +
        '<path d="' + trazo + '" fill="' + color + '" fill-opacity="0.13" stroke="none"/>' +
        '<path class="g-linea" d="' + trazo + '" stroke="' + color + '"/>' +
        '<circle class="g-punto" style="animation-delay:1.6s" cx="250" cy="44" r="4" fill="' + color + '"/>' +
        '<text class="g-punto" style="animation-delay:1.7s" x="250" y="34" font-size="10" fill="' + color + '" text-anchor="middle">pico</text>' +
        '<text x="20" y="128" font-size="9.5" fill="' + texto + '">repetición 1</text>' +
        '<text x="248" y="128" font-size="9.5" fill="' + texto + '">repetición 2</text></svg>',
      take: "El músculo que debía trabajar, trabajando: la activación se ve, se compara entre lados y se sigue en el tiempo.",
    };
  }

  // "Qué hace la app": una pantalla recreada + qué hace + la ciencia que
  // lo sostiene. Las referencias salen del documento de fundamento
  // científico de TrainLab: aquí no se promete nada que el dossier no
  // pueda defender. Regla de la casa: ningún número sin una referencia.
  function tarjetaApp(f, producto) {
    var t = el("div", "tarjeta");
    t.append(el("h2", null, "Qué hace " + f.app));

    var g = graficaDe(producto, f.color);
    var box = el("div", "grafica");
    box.append(el("div", "viz-tit", g.titulo), el("div", "viz-sub", g.subtitulo));
    if (g.badge) {
      var badge = el("div", "viz-badge");
      var num = el("span", "num", g.badge.num);
      num.style.color = g.badge.color || f.color;
      badge.append(num, el("span", "lab", g.badge.lab));
      box.append(badge);
    }
    var svgWrap = el("div");
    svgWrap.innerHTML = g.svg;
    box.append(svgWrap, el("div", "viz-take", g.take));
    t.append(box);

    var ul = el("ul", "applista");
    f.queHace.forEach(function (q) {
      var li = el("li");
      var check = el("span", null, "✓");
      check.style.color = f.color; check.style.fontWeight = "700";
      li.append(check, el("span", null, q));
      ul.append(li);
    });
    t.append(ul);

    var cred = el("div", "cred");
    cred.append(
      el("div", "credhead", "La ciencia que lo sostiene"),
      el("div", "credsub", "TrainLab no inventa métricas: implementa métodos publicados y revisados por pares. Ningún número sin una referencia detrás.")
    );
    f.ciencia.forEach(function (r) {
      var c = el("div", "credit");
      var a = el("div", "a", r.autor); a.style.color = f.color;
      c.append(el("div", "m", r.metodo), a, el("div", "x", r.texto));
      cred.append(c);
    });
    t.append(cred);
    return t;
  }

  // El vídeo explicativo de la app. Hasta que exista (f.video = ruta del
  // mp4 en este repo), un hueco elegante que no promete fechas.
  function tarjetaVideo(f) {
    var t = el("div", "tarjeta");
    t.append(el("h2", null, "La app, en vídeo"));
    if (f.video) {
      var v = document.createElement("video");
      v.src = f.video;
      v.controls = true;
      v.playsInline = true;
      v.preload = "metadata";
      t.append(v);
    } else {
      var ph = el("div", "video-ph");
      ph.append(
        el("div", "play", "▶"),
        el("span", null, "Estamos grabando el vídeo de " + f.app + "."),
        el("span", null, "Mientras tanto, los pasos de arriba te llevan igual de lejos.")
      );
      t.append(ph);
    }
    return t;
  }

  function botonWeb() {
    var b = el("a", "boton-sec", "Descubrir TrainLab");
    b.href = WEB;
    return b;
  }

  function tarjetaFundador() {
    var t = el("div", "tarjeta fundador");
    t.append(
      el("p", null, "Gracias por estar entre los primeros. TrainLab se construye pieza a pieza en España, y esta caja es de las primeras que salen. Si algo no va perfecto, escríbeme y lo arreglo yo mismo."),
      el("p", "firma", "— José David, fundador de TrainLab")
    );
    return t;
  }

  // ---- Las páginas ----

  function pintarCaja(producto, caja, codigo, estadoGarantia) {
    var f = FICHAS[producto];
    document.title = f.nombre + " · caja " + codigo;
    contenido.textContent = "";
    contenido.append(
      tarjetaProducto(f, caja, codigo),
      tarjetaPasos(f, codigo),
      botonApp(f, codigo),
      tarjetaVideo(f),
      tarjetaApp(f, producto),
      tarjetaGarantia(estadoGarantia, caja, codigo),
      tarjetaFundador(),
      botonWeb()
    );
    animar();
    pieSoporte("Soporte · caja " + codigo);
  }

  // La cascada de entrada: cada pieza sube con un pelín de retraso
  // sobre la anterior. Solo la primera pintura; los repintados por
  // red o caché no vuelven a animar (sería mareante).
  var yaAnimado = false;
  function animar() {
    if (yaAnimado) return;
    yaAnimado = true;
    Array.prototype.forEach.call(contenido.children, function (n, i) {
      n.classList.add("anima");
      n.style.animationDelay = (i * 0.07) + "s";
    });
  }

  function pintarPortada() {
    document.title = "TrainLab · tu caja";
    contenido.textContent = "";
    var t = el("div", "tarjeta");
    t.append(el("h1", null, "Tu caja TrainLab"),
             el("p", "que-es", "Acerca el móvil al símbolo NFC de la caja (o escanea su código QR) y aquí aparecerán tu guía de primeros pasos y tu garantía."));
    contenido.append(t, botonWeb());
    animar();
    pieSoporte("Mi caja TrainLab");
  }

  function pintarDesconocida(codigo) {
    document.title = "TrainLab · código no reconocido";
    contenido.textContent = "";
    var t = el("div", "tarjeta");
    var p = el("p", "que-es");
    p.style.marginTop = "8px";
    p.append("El código ", el("b", null, codigo),
      " no corresponde a ninguna caja registrada de TrainLab. Si acabas de comprar el producto, puede tratarse de un error de lectura — o de una unidad no original.");
    t.append(el("h1", null, "Código no reconocido"), p,
             el("p", "serie", "Escríbenos con una foto de la caja y lo comprobamos al momento."));
    var boton = el("a", "boton", "Escribir a soporte");
    boton.style.background = "#2E7DF6"; boton.style.color = "#fff";
    boton.href = "mailto:" + SOPORTE + "?subject=" + encodeURIComponent("Código no reconocido · " + codigo);
    contenido.append(t, boton);
    pieSoporte("Código no reconocido · " + codigo);
  }

  // ---- El arranque ----

  function arrancar() {
    var hash = decodeURIComponent(location.hash.replace(/^#/, "")).trim().toLowerCase();
    if (!hash) { pintarPortada(); return; }

    // #producto-CODIGO (el bueno) o #CODIGO (formato viejo, sigue vivo)
    var producto = null, codigo = hash;
    var guion = hash.indexOf("-");
    if (guion > 0 && FICHAS[hash.slice(0, guion)]) {
      producto = hash.slice(0, guion);
      codigo = hash.slice(guion + 1);
    }
    codigo = codigo.toUpperCase();
    if (!RE_CODIGO.test(codigo)) { pintarDesconocida(codigo || hash); return; }

    // Con el producto en la mano, TODO lo útil se pinta ya, sin esperar
    // a la red; la caché puede adelantar incluso la serie y la garantía.
    var cacheada = cacheLeer(codigo);
    if (producto) {
      pintarCaja(producto, cacheada, codigo,
                 cacheada ? (cacheada.activada_at ? "activada" : "pendiente") : "comprobando");
    } else if (cacheada && FICHAS[cacheada.producto]) {
      pintarCaja(cacheada.producto, cacheada, codigo,
                 cacheada.activada_at ? "activada" : "pendiente");
    }

    fetch(API + codigo, { headers: { Accept: "application/json" } })
      .then(function (r) {
        if (r.status === 404) { pintarDesconocida(codigo); return null; }
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(function (caja) {
        if (!caja) return;
        cacheGuardar(caja);
        pintarCaja(caja.producto, caja, caja.codigo,
                   caja.activada_at ? "activada" : "pendiente");
      })
      .catch(function () {
        if (producto || cacheada) {
          // La guía ya está en pantalla; solo la garantía queda sin comprobar.
          pintarCaja(producto || cacheada.producto, cacheada, codigo, cacheada ? (cacheada.activada_at ? "activada" : "pendiente") : "sin-red");
        } else {
          contenido.textContent = "";
          var t = el("div", "tarjeta");
          t.append(el("h1", null, "Sin conexión"),
                   el("p", "que-es", "No hemos podido leer los datos de tu caja. Comprueba la conexión y recarga la página."));
          contenido.append(t);
          pieSoporte("No carga el landing de la caja");
        }
      });
  }

  // Si el #hash llega o cambia después de cargar (algún navegador o
  // lector NFC lo añade tarde), la página se repinta sola.
  window.addEventListener("hashchange", arrancar);
  arrancar();
})();
</script>
